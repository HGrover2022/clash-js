# 节点选择自定义域名
# 想强制走主节点选择组的自定义域名

# 全局直连自定义域名
# 想强制直连的额外域名

# 漏网之鱼自定义域名
# 特殊场景：不想被前面规则命中，可以钉在漏网之鱼再手动选分组

# ===================== DNS 配置 =====================
[dns]
# DNS 防泄露配置
enable=true
listen=0.0.0.0:1053
ipv6=false
prefer-h3=false
respect-rules=true
use-system-hosts=false
cache-algorithm=arc
enhanced-mode=fake-ip
fake-ip-range=198.18.0.1/16

# Fake-IP 过滤列表
fake-ip-filter=+.lan,+.local,+.msftconnecttest.com,+.msftncsi.com,localhost.ptlogin2.qq.com,localhost.sec.qq.com,+.in-addr.arpa,+.ip6.arpa,time.*.com,time.*.gov,pool.ntp.org,localhost.work.weixin.qq.com

# 默认 DNS 服务器
default-nameserver=223.5.5.5,1.2.4.8

# 国外 DNS 服务器（主要使用）
nameserver=https://208.67.222.222/dns-query,https://77.88.8.8/dns-query,https://1.1.1.1/dns-query,https://8.8.4.4/dns-query

# 代理服务器 DNS（国内 DoH）
proxy-server-nameserver=https://223.5.5.5/dns-query,https://doh.pub/dns-query

# 直连 DNS（国内 DoH）
direct-nameserver=https://223.5.5.5/dns-query,https://doh.pub/dns-query

# DNS 策略（中国域名使用国内 DNS）
nameserver-policy=geosite:private,cn,https://223.5.5.5/dns-query,https://doh.pub/dns-query

# ===================== 代理节点配置 =====================
[proxy]
# ISP 家宽节点（socks5 类型，使用 dialer-proxy）
# 格式：ISP = socks5, server, port, username, password, udp=true, dialer-proxy=all
# 注意：server、port、username、password 需要替换为实际值
# 示例：ISP = socks5, 192.168.1.100, 1080, myuser, mypass, udp=true, dialer-proxy=all

# ===================== 配置说明 =====================
# 1. 节点过滤：在 [custom] 部分的 exclude_remarks 中配置
# 2. 自动选择：通过 url-test 类型的代理组实现，测速间隔 300 秒，容差 35ms
# 3. 自定义域名：在 [custom_rules] 部分添加，取消注释即可启用
# 4. DNS 防泄露：在 [dns] 部分配置，使用 DoH 加密查询
# 5. ISP 节点：在 [proxy] 部分配置，使用 dialer-proxy 指向 all 分组
# 6. 规则优先级：自定义规则 > 规则集 > GEOSITE/GEOIP > 漏网之鱼

# ===================== 参数说明 =====================
# url-test 参数格式：
# custom_proxy_group=组名`url-test`过滤规则`测速URL`测速间隔(秒)`容差(ms)`超时(ms)
# 
# select 参数格式：
# custom_proxy_group=组名`select`[]固定选项1`[]固定选项2`过滤规则1`过滤规则2
#
# 过滤规则说明：
# - 正则表达式：(关键词1|关键词2|关键词3) 匹配包含任一关键词的节点
# - 排除规则：^(?!.*(关键词1|关键词2)).*$ 排除包含关键词的节点
# - 通配符：.* 匹配所有节点

# ===================== 使用方法 =====================
# 1. 将此文件上传到支持 INI 格式的订阅转换服务
# 2. 或者使用 subconverter 等工具进行本地转换
# 3. 转换命令示例：
#    subconverter -g --artifact "clash" -c config.ini -o output.yaml
# 4. 在 Clash 客户端中导入生成的配置文件

# ===================== 注意事项 =====================
# 1. 所有节点自动启用 UDP 转发
# 2. ISP 节点需要手动配置实际的服务器信息
# 3. 自定义域名规则默认被注释，需要时取消注释
# 4. 节点过滤规则可以根据需要组合使用
# 5. 自动选择功能通过 url-test 实现，可调整测速参数
