# ===================== Clash 远程配置模板 (INI 格式) =====================
# 转换自 clash_script.js，保持原有逻辑和方法

# ===================== 节点过滤配置 =====================
[custom]
# 节点过滤规则：取消注释对应行即可启用过滤
# 当前启用：屏蔽香港节点
# 格式：exclude_remarks=(规则1|规则2|规则3)
exclude_remarks=(港|hk|HK|Hong|HONG|九龙|官网|套餐|流量|异常|剩余)
# 取消注释下面的行来添加更多过滤规则：
# exclude_remarks=(港|hk|HK|Hong|HONG|九龙|台|tw|TW|Taiwan|TAIWAN|官网|套餐|流量|异常|剩余)
# exclude_remarks=(港|hk|HK|Hong|HONG|九龙|日|jp|JP|Japan|JAPAN|官网|套餐|流量|异常|剩余)
# exclude_remarks=(港|hk|HK|Hong|HONG|九龙|新|sg|SG|Singapore|SINGAPORE|官网|套餐|流量|异常|剩余)
# exclude_remarks=(港|hk|HK|Hong|HONG|九龙|美|us|US|United States|USA|官网|套餐|流量|异常|剩余)
# exclude_remarks=(港|hk|HK|Hong|HONG|九龙|韩|kr|KR|Korea|KOREA|官网|套餐|流量|异常|剩余)

# ===================== 自动选择节点配置 =====================
# 是否启用自动选择节点（true=启用，false=禁用）
enable_rule_generator=true
# 自动选择节点的测速间隔（秒）
surge_rule_base=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini

# ===================== Clash 配置 =====================
[clash_proxy_group]
# 节点选择组（包含自动选择和手动选择）
custom_proxy_group=节点选择`select`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$
# 谷歌服务组
custom_proxy_group=谷歌服务`select`[]节点选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`[]全局直连`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$
# 流媒体组
custom_proxy_group=流媒体`select`[]节点选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`[]全局直连`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$
# 社交媒体组
custom_proxy_group=社交媒体`select`[]节点选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`[]全局直连`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$
# AI 服务组
custom_proxy_group=AI`select`[]节点选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$
# 微软服务组
custom_proxy_group=微软服务`select`[]全局直连`[]节点选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$
# 苹果服务组
custom_proxy_group=苹果服务`select`[]节点选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`[]全局直连`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$
# 动画疯组（仅台湾节点）
custom_proxy_group=动画疯`select`[]节点选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`(台|tw|TW|日月潭)
# 哔哩哔哩港澳台组
custom_proxy_group=哔哩哔哩港澳台`select`[]全局直连`[]节点选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$
# Spotify 组
custom_proxy_group=Spotify`select`[]节点选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`[]全局直连`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$
# 广告过滤组
custom_proxy_group=广告过滤`select`[]REJECT`[]DIRECT
# 全局直连组
custom_proxy_group=全局直连`select`[]DIRECT`[]节点选择`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$
# 全局拦截组
custom_proxy_group=全局拦截`select`[]REJECT`[]DIRECT
# 漏网之鱼组
custom_proxy_group=漏网之鱼`select`[]节点选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇺🇸 美国自动`[]socks5`[]全局直连`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$

# ===================== 地区自动选择分组 =====================
# 日本自动选择（url-test 模式，自动测速选择最快节点）
custom_proxy_group=🇯🇵 日本自动`url-test`(日本|霓虹|jp|JP|Japan|JAPAN|🇯🇵)`https://www.google.com/generate_204`300`35`2000
# 台湾自动选择
custom_proxy_group=🇹🇼 台湾自动`url-test`(台湾|日月潭|TW|tw|Taiwan)`https://www.google.com/generate_204`300`35`2000
# 美国自动选择
custom_proxy_group=🇺🇸 美国自动`url-test`(美国|US|us|美利坚|🇺🇸)`https://www.google.com/generate_204`300`35`2000

# ===================== 前置机场选择器（用于 ISP dialer-proxy） =====================
custom_proxy_group=all`select`.*`^(?!.*(官网|套餐|流量|异常|剩余|港|hk|HK|Hong|HONG|九龙)).*$

# ===================== socks5 分组（家宽 ISP 节点） =====================
custom_proxy_group=socks5`select`[]ISP

# ===================== 规则集配置 =====================
[ruleset]
# 自定义规则（优先级最高）
ruleset=节点选择,https://raw.githubusercontent.com/custom/rules/googleapis.list
ruleset=节点选择,https://raw.githubusercontent.com/custom/rules/gstatic.list
ruleset=节点选择,https://raw.githubusercontent.com/custom/rules/github-io.list

# 基础规则集
ruleset=全局直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt
ruleset=全局直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt
ruleset=广告过滤,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
ruleset=苹果服务,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt
ruleset=苹果服务,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt
ruleset=微软服务,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Microsoft/Microsoft.yaml
ruleset=流媒体,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/YouTube/YouTube.yaml
ruleset=流媒体,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Netflix/Netflix.yaml
ruleset=流媒体,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/TikTok/TikTok.yaml
ruleset=动画疯,https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/rule/Bahamut.txt
ruleset=Spotify,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Spotify/Spotify.yaml
ruleset=哔哩哔哩港澳台,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/BiliBiliIntl/BiliBiliIntl.yaml
ruleset=AI,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/OpenAI/OpenAI.yaml
ruleset=社交媒体,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Twitter/Twitter.yaml
ruleset=社交媒体,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt
ruleset=谷歌服务,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Google/Google.yaml
ruleset=节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
ruleset=节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
ruleset=节点选择,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt
ruleset=全局直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
ruleset=全局直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
ruleset=全局直连,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt
ruleset=全局直连,[]GEOSITE,CN
ruleset=全局直连,[]GEOIP,LAN,no-resolve
ruleset=全局直连,[]GEOIP,CN,no-resolve
ruleset=漏网之鱼,[]MATCH

# ===================== 自定义域名分流规则 =====================
[custom_rules]
# 谷歌服务自定义域名
;DOMAIN-SUFFIX,scholar.google.com,谷歌服务
;DOMAIN-SUFFIX,accounts.google.com,谷歌服务
DOMAIN-SUFFIX,antigravity-unleash.goog,谷歌服务

# 流媒体自定义域名
;DOMAIN-SUFFIX,m.youtube.com,流媒体
;DOMAIN-SUFFIX,ytimg.com,流媒体
;DOMAIN-SUFFIX,netflix.com,流媒体
;DOMAIN-SUFFIX,tiktokv.com,流媒体

# 社交媒体自定义域名
;DOMAIN-SUFFIX,t.me,社交媒体
;DOMAIN-SUFFIX,x.com,社交媒体
;DOMAIN-SUFFIX,twitter.com,社交媒体

# AI 自定义域名
;DOMAIN-SUFFIX,gemini.google.com,AI

# 微软服务自定义域名
