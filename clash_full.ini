[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果
;本模版为url-select优化经过测试

;Spotify
ruleset=🎶 Spotify,[]GEOSITE,spotify
ruleset=🌐 全球直连,[]DOMAIN-SUFFIX,playit.gg
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,trae.com.cn
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
;社交媒体包括 Telegram/WhatsApp/Line/X(Twitter) 等海外主流社交与即时通讯平台
ruleset=💬 社交媒体,[]GEOIP,telegram,no-resolve
ruleset=💬 社交媒体,[]GEOSITE,x
ruleset=💬 社交媒体,[]GEOSITE,category-communication
ruleset=💬 社交媒体,[]GEOSITE,category-social-media-!cn
;本地地址和域名直连
ruleset=🌐 全球直连,[]GEOSITE,private
ruleset=🌐 全球直连,[]GEOIP,private,no-resolve
;国内游戏域名直连
ruleset=🌐 全球直连,[]GEOSITE,category-games@cn
;开发社区,及数字货币
ruleset=💻 GitHub,[]GEOSITE,github
ruleset=💻 GitHub,[]GEOSITE,huaweicloud
ruleset=💵 数字货币,[]GEOSITE,category-cryptocurrency 
ruleset=💻 GitHub,[]GEOSITE,category-dev
;游戏平台包括 Steam/Epic/EA/Blizzard/UBI/Xbox/PlayStation
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=🇬 谷歌服务,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🌐 全球直连,[]GEOSITE,google-cn
ruleset=🎮 Steam,https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/steam.list,28800
ruleset=🎮 Steam,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Epic/Epic.list,28800
ruleset=🎮 Steam,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/EA/EA.list,28800
ruleset=🎮 Steam,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Blizzard/Blizzard.list,28800
ruleset=🎮 Steam,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/UBI/UBI.list,28800
ruleset=🎮 Steam,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Xbox/Xbox.list,28800
ruleset=🎮 Steam,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Sony/Sony.list,28800
;我的个人游戏节点
ruleset=🎮 Game,https://raw.githubusercontent.com/HGrover2022/clash-js/refs/heads/main/game.list,28800
;流媒体包括 YouTube/TikTok/Emby/常规娱乐/Netflix/Nsfw/ST直播
ruleset=🎥 流媒体,[]GEOSITE,youtube
ruleset=🎥 流媒体,[]GEOSITE,tiktok
ruleset=🎥 流媒体,[]GEOSITE,category-emby
ruleset=🎥 流媒体,https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/Emby.list,28800
ruleset=🎥 流媒体,[]GEOIP,netflix,no-resolve
ruleset=🎥 流媒体,[]GEOSITE,category-porn
ruleset=🎥 流媒体,https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/Nsfw.list,28800
ruleset=🎥 流媒体,https://gh-proxy.com/https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/StripChat.list,28800
ruleset=🎥 流媒体,[]GEOSITE,category-entertainment
;本项目收录的直连规则
ruleset=🌐 全球直连,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🌐 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
;各大游戏平台下载域名直连
ruleset=🌐 全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名直连
ruleset=🌐 全球直连,[]GEOSITE,category-public-tracker
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🌐 全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🌐 全球直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消

;本项目收录的代理规则  
ruleset=🪜 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🪜 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800
ruleset=🪜 手动选择,[]GEOSITE,gfw
;PT/BT 优化开启会使 80/443 以外端口的流量直连
ruleset=🔀 非标端口,clash-classic:https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Port_Direct.yaml,28800
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位
custom_proxy_group=🪜 手动选择`select`[]♻️ 自动选择`[]🇯🇵 日本自动`[]🇹🇼 台湾自动`[]🇸🇬 新加坡自动`[]🇺🇸 美国自动`[]🇭🇰 香港自动`.*
