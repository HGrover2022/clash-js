[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果
;本模版为url-select优化经过测试

;Spotify
ruleset=🎶 Spotify,[]GEOSITE,spotify
ruleset=🌐 全球直连,[]DOMAIN-SUFFIX,playit.gg
ruleset=🪜 手动选择,[]DOMAIN-SUFFIX,trae.com.cn
ruleset=🪜 手动选择,[]GEOSITE,category-ai-!cn
;社交媒体包括 Telegram/WhatsApp/Line/X(Twitter) 等海外主流社交与即时通讯平台
ruleset=🪜 手动选择,[]GEOIP,telegram,no-resolve
;开发社区,及数字货币
ruleset=🪜 手动选择,[]GEOSITE,huaweicloud
ruleset=💵 数字货币,[]GEOSITE,category-cryptocurrency 
ruleset=🪜 手动选择,[]GEOSITE,category-dev
;游戏平台极简版：优先使用内置 GEOSITE，减少远程规则集占用
ruleset=🪜 手动选择,[]GEOSITE,category-speedtest
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=🪜 手动选择,[]GEOSITE,microsoft
ruleset=🪜 手动选择,[]GEOSITE,steam
;我的个人游戏节点
ruleset=🪜 手动选择,[]DOMAIN,mc.loyisa.cn
ruleset=🪜 手动选择,[]DOMAIN-SUFFIX,hypixel.net
ruleset=🪜 手动选择,[]DOMAIN-SUFFIX,bedwarspractice.club
ruleset=🪜 手动选择,[]DOMAIN-SUFFIX,minecraftservices.com
ruleset=🪜 手动选择,[]DOMAIN-SUFFIX,mojang.com
ruleset=🪜 手动选择,[]DOMAIN-SUFFIX,minecraft.net
;流媒体包括 YouTube/TikTok/Emby/常规娱乐/Netflix/Nsfw/ST直播
ruleset=🪜 手动选择,[]GEOSITE,category-emby
ruleset=🪜 手动选择,[]GEOIP,netflix,no-resolve
ruleset=🪜 手动选择,[]GEOSITE,category-entertainment
;本项目收录的代理规则  
ruleset=🪜 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🪜 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800
ruleset=🪜 手动选择,[]GEOSITE,gfw
;本地地址和域名直连
ruleset=🌐 全球直连,[]GEOSITE,private
ruleset=🌐 全球直连,[]GEOIP,private,no-resolve
ruleset=🌐 全球直连,[]GEOSITE,google-cn
;本项目收录的直连规则
ruleset=🌐 全球直连,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🌐 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
;国内游戏域名直连
ruleset=🌐 全球直连,[]GEOSITE,category-games@cn
;各大游戏平台下载域名直连
ruleset=🌐 全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名直连
ruleset=🌐 全球直连,[]GEOSITE,category-public-tracker
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🌐 全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🌐 全球直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消
;PT/BT 优化开启会使 80/443 以外端口的流量直连
ruleset=🔀 非标端口,clash-classic:https://raw.githubusercontent.com/jackieyiwu/Custom_OpenClash_Rules/refs/heads/main/rule/Custom_Port_Direct.yaml,28800
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位
custom_proxy_group=🪜 手动选择`select`[]♻️ 自动选择`[]🇯🇵 日本节点`[]🇹🇼 台湾节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🎶 Spotify`select`[]🪜 手动选择`[]♻️ 自动选择`[]🇯🇵 日本节点`[]🇹🇼 台湾节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🌐 全球直连`.*
custom_proxy_group=🍎 苹果服务`select`[]🪜 手动选择`[]♻️ 自动选择`[]🇯🇵 日本节点`[]🇹🇼 台湾节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🌐 全球直连`.*
custom_proxy_group=💵 数字货币`select`[]🪜 手动选择`[]♻️ 自动选择`[]🇯🇵 日本节点`[]🇹🇼 台湾节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🌐 全球直连`.*
custom_proxy_group=🔀 非标端口`select`[]🌐 全球直连`[]🐟 漏网之鱼
custom_proxy_group=🇯🇵 日本节点`url-test`(🇯🇵|日本|Japan|JAPAN|JPN|NRT|HND|KIX|TYO|OSA|关西|Kansai|KANSAI)`https://cp.cloudflare.com/generate_204`1800,,50
custom_proxy_group=🇹🇼 台湾节点`url-test`(🇹🇼|台|\bTW(?:[-_ ]?\d+(?:[-_ ]?[A-Za-z]{2,})?)?\b|tw|Taiwan|TAIWAN|TPE|KHH|台北|新北|桃园|台中|高雄)`https://cp.cloudflare.com/generate_204`1800,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(🇸🇬|新加坡|坡|狮城|br|\bSG(?:[-_ ]?\d+(?:[-_ ]?[A-Za-z]{2,})?)?\b|Singapore|SINGAPORE|SIN)`http://connectivitycheck.gstatic.com/generate_204`1800,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(🇺🇸|美|\bUS(?:[-_ ]?\d+(?:[-_ ]?[A-Za-z]{2,})?)?\b|United States|UnitedStates|UNITED STATES|USA)`https://cp.cloudflare.com/generate_204`1800,,50
custom_proxy_group=🇭🇰 香港节点`url-test`(🇭🇰|港|\bHK(?:[-_ ]?\d+(?:[-_ ]?[A-Za-z]{2,})?)?\b|hk|Hong Kong|HongKong)`https://cp.cloudflare.com/generate_204`1800,,50
custom_proxy_group=🐟 漏网之鱼`select`[]🪜 手动选择`[]♻️ 自动选择`[]🇯🇵 日本节点`[]🇹🇼 台湾节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`.*
custom_proxy_group=🌐 全球直连`select`[]DIRECT`[]🇯🇵 日本节点`[]🇹🇼 台湾节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点
;设置分组标志位

;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true
